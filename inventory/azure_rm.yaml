plugin: azure.azcollection.azure_rm
plain_host_names: yes
include_extended_facts: yes
exclude_host_filters:
  - tags['cloudlens'] is not defined or tags['cloudlens'] != 'yes'
keyed_groups:
  - prefix: os
    key: tags['os'] | default('untagged')
  - prefix: env
    key: tags['env'] | default('untagged')
  - prefix: location
    key: location | default('untagged')
conditional_groups:
  ubuntu_prod_vms: "tags['os'] | default('') == 'ubuntu' and tags['env'] | default('') == 'prod'"
  redhat_prod_vms: "tags['os'] | default('') == 'rhel' and tags['env'] | default('') == 'prod'"
  windows_prod_vms: "tags['os'] | default('') == 'windows' and tags['env'] | default('') == 'prod'"
  ubuntu_dev_vms: "tags['os'] | default('') == 'ubuntu' and tags['env'] | default('') == 'dev'"
  redhat_dev_vms: "tags['os'] | default('') == 'rhel' and tags['env'] | default('') == 'dev'"
  windows_dev_vms: "tags['os'] | default('') == 'windows' and tags['env'] | default('') == 'dev'"
hostvar_expressions:
  # Windows VMs → use public IP (WinRM directly, no jumpbox)
  # Linux VMs   → use private IP (jumpbox/Bastion required)
  ansible_host: (public_ipv4_address | default([], true) | first) if (tags['os'] | default('') == 'windows' and (public_ipv4_address | default([], true) | length) > 0) else private_ipv4_addresses[0]
  azure_resource_group: resource_group
  azure_private_ip: private_ipv4_addresses[0]
  azure_public_ip: (public_ipv4_address | default([], true) | first) if (public_ipv4_address | default([], true) | length) > 0 else ''
