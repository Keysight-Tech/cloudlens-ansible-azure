[defaults]
forks = 20
host_key_checking = False
log_path = ./ansible.log
timeout = 40
inventory = inventory/azure_rm.yaml
interpreter_python = auto_silent
stdout_callback = yaml
gathering = smart
fact_caching = jsonfile
fact_caching_connection = .ansible_facts_cache
fact_caching_timeout = 3600

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=120s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
pipelining = True

[inventory]
enable_plugins = azure.azcollection.azure_rm, constructed, auto, host_list, yaml, ini
