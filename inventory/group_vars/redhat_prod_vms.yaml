---
# RHEL-specific connection vars
ansible_user: "{{ linux.ansible_user | default('azureuser') }}"
ansible_ssh_private_key_file: "{{ linux.ssh_key_file | default('~/.ssh/id_rsa') }}"
ansible_python_interpreter: /usr/libexec/platform-python

# Runtime preferences
podman_command: podman
ca_cert_dir: "/etc/pki/ca-trust/source/anchors"
