# =====================================================================
# High-scale Ansible config — tuned for 1000+ VMs
# =====================================================================
# Symlink/copy to ansible.cfg before scaled deployments
# =====================================================================

[defaults]
forks = 200                              # default parallelism (override via --forks)
host_key_checking = False
log_path = ./logs/ansible.log
timeout = 60                             # generous for slow VMs
retry_files_enabled = False
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts
fact_caching_timeout = 3600
strategy = free                          # hosts run independently — don't block on slow ones
callbacks_enabled = profile_tasks,timer  # see what's slow
interpreter_python = auto_silent
stdout_callback = yaml                   # readable output

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=600s -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -o PreferredAuthentications=publickey
pipelining = True                        # eliminates intermediate SSH steps (30-40% speedup)
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
retries = 3

[persistent_connection]
connect_timeout = 60
command_timeout = 60

[colors]
ok = green
changed = yellow
unreachable = bright red
failed = bright red
skipped = cyan
