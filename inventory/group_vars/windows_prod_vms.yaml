---
# Windows-specific vars. WinRM uses PUBLIC IP (no jumpbox)
ansible_host: "{{ azure_public_ip | default(azure_private_ip) }}"
ansible_user: "{{ windows.ansible_user | default('azureuser') }}"
ansible_password: "{{ lookup('env', 'ANSIBLE_WINRM_PASSWORD') }}"
ansible_connection: winrm
ansible_winrm_transport: "{{ windows.ansible_winrm_transport | default('basic') }}"
ansible_winrm_server_cert_validation: "{{ windows.ansible_winrm_server_cert_validation | default('ignore') }}"
ansible_port: 5985

# Override SSH ProxyJump from all.yaml (Windows uses WinRM, not SSH)
ansible_ssh_common_args: ""

# Installer paths
local_installer_path: "{{ windows.installer_path | default('files/cloudlens-win-sensor-6.13.0.359.exe') }}"
cloudlens_installer_filename: "{{ windows.installer_filename | default('cloudlens-win-sensor-6.13.0.359.exe') }}"
ssl_verify: "{{ cloudlens.ssl_verify | default('no') }}"
auto_update: "{{ cloudlens.auto_update | default('yes') }}"
